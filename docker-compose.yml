services:
  db:
    image: postgres:16-alpine
    container_name: shopee_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-5050}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    command: ["postgres", "-c", "listen_addresses=*"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopee_user} -d ${POSTGRES_DB:-shopee_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  importer:
    build:
      context: .
      dockerfile: scripts/Dockerfile
    container_name: shopee_importer
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
