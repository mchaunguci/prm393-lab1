# SonarCloud — Flutter app (Dart + Python scripts only)
sonar.sourceEncoding=UTF-8

# Do not scan platform folders or SQL schema (Postgres VARCHAR is correct; rules target Oracle)
sonar.sources=lib,shopee-db/scripts
sonar.exclusions=\
  **/linux/**,\
  **/windows/**,\
  **/macos/**,\
  **/android/**,\
  **/ios/**,\
  **/web/**,\
  **/build/**,\
  **/.dart_tool/**,\
  **/test/**,\
  **/shopee-db/db/**,\
  **/generated_plugin_registrant.*,\
  **/generated_plugins.cmake

# Disable C/C++/Objective-C/SQL analysis (Flutter desktop templates are not app logic)
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
sonar.sql.file.suffixes=-
